<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 600">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; }
    .arr { stroke-width: 1.5; }

    .bg { fill: #ffffff; }
    .th-def { fill: #24292f; }
    .ts-def { fill: #57606a; }
    .arr { stroke: #57606a; }

    .box-gray { fill: #f6f8fa; stroke: #d0d7de; }
    .box-teal { fill: #dff5ee; stroke: #1d9e75; }
    .box-coral { fill: #faece7; stroke: #d85a30; }
    .box-blue { fill: #e6f1fb; stroke: #378add; }

    .th-gray { fill: #24292f; }  .ts-gray { fill: #57606a; }
    .th-teal { fill: #085041; }  .ts-teal { fill: #0f6e56; }
    .th-coral { fill: #712b13; } .ts-coral { fill: #993c1d; }
    .th-blue { fill: #0c447c; }  .ts-blue { fill: #185fa5; }

    .dashed { stroke-dasharray: 4 3; }
    .arrow-coral { stroke: #d85a30; }

    .legend-teal { fill: #5dcaa5; stroke: #0f6e56; }
    .legend-coral { fill: #f0997b; stroke: #993c1d; }
    .legend-blue { fill: #85b7eb; stroke: #185fa5; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .th-def { fill: #e6edf3; }
      .ts-def { fill: #8b949e; }
      .arr { stroke: #8b949e; }

      .box-gray { fill: #161b22; stroke: #30363d; }
      .box-teal { fill: #0a2e22; stroke: #1d9e75; }
      .box-coral { fill: #2a1510; stroke: #d85a30; }
      .box-blue { fill: #0c1929; stroke: #378add; }

      .th-gray { fill: #e6edf3; }  .ts-gray { fill: #8b949e; }
      .th-teal { fill: #9fe1cb; }  .ts-teal { fill: #5dcaa5; }
      .th-coral { fill: #f5c4b3; } .ts-coral { fill: #f0997b; }
      .th-blue { fill: #b5d4f4; }  .ts-blue { fill: #85b7eb; }

      .legend-teal { fill: #0f6e56; stroke: #5dcaa5; }
      .legend-coral { fill: #993c1d; stroke: #f0997b; }
      .legend-blue { fill: #185fa5; stroke: #85b7eb; }
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="680" height="600" rx="8"/>

  <!-- Step 1: Browse -->
  <rect class="box-gray" x="220" y="30" width="240" height="44" rx="8" stroke-width="0.5"/>
  <text class="th th-gray" x="340" y="52" text-anchor="middle" dominant-baseline="central">Browse ebooks + connect</text>

  <line x1="340" y1="74" x2="340" y2="104" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 2: Choose chain -->
  <rect class="box-gray" x="200" y="106" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="th th-gray" x="340" y="128" text-anchor="middle" dominant-baseline="central">Select source chain (18 options)</text>

  <!-- Decision -->
  <text class="ts ts-def" x="340" y="172" text-anchor="middle">Token in wallet?</text>

  <!-- Left: has USDC -->
  <path d="M260 150 L160 150 L160 210" fill="none" class="arr" marker-end="url(#arrow)"/>
  <text class="ts ts-def" x="195" y="185" text-anchor="middle">USDC</text>

  <!-- Right: other token -->
  <path d="M420 150 L520 150 L520 210" fill="none" class="arr" marker-end="url(#arrow)"/>
  <text class="ts ts-def" x="480" y="185" text-anchor="middle">Other token</text>

  <!-- LEFT: Approve -->
  <rect class="box-teal" x="60" y="212" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th th-teal" x="160" y="232" text-anchor="middle" dominant-baseline="central">approve USDC</text>
  <text class="ts ts-teal" x="160" y="250" text-anchor="middle" dominant-baseline="central">TokenMessengerV2</text>

  <line x1="160" y1="268" x2="160" y2="298" class="arr" marker-end="url(#arrow)"/>

  <!-- LEFT: Burn -->
  <rect class="box-teal" x="40" y="300" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th th-teal" x="160" y="320" text-anchor="middle" dominant-baseline="central">depositForBurnWithHook</text>
  <text class="ts ts-teal" x="160" y="338" text-anchor="middle" dominant-baseline="central">Burns USDC on source chain</text>

  <!-- RIGHT: Uniswap quote -->
  <rect class="box-coral" x="400" y="212" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th th-coral" x="520" y="232" text-anchor="middle" dominant-baseline="central">Uniswap quote</text>
  <text class="ts ts-coral" x="520" y="250" text-anchor="middle" dominant-baseline="central">POST /api/uniswap/quote</text>

  <line x1="520" y1="268" x2="520" y2="298" class="arr" marker-end="url(#arrow)"/>

  <!-- RIGHT: Swap -->
  <rect class="box-coral" x="400" y="300" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th th-coral" x="520" y="320" text-anchor="middle" dominant-baseline="central">Permit2 + swap tx</text>
  <text class="ts ts-coral" x="520" y="338" text-anchor="middle" dominant-baseline="central">Token to USDC in wallet</text>

  <!-- Merge arrow -->
  <path d="M400 328 L290 328 L290 400 L200 400" fill="none" class="arrow-coral dashed" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="ts ts-coral" x="350" y="400" text-anchor="middle">Joins USDC flow</text>

  <!-- Arrow down from burn -->
  <line x1="160" y1="356" x2="160" y2="416" class="arr" marker-end="url(#arrow)"/>

  <!-- Circle forwarding -->
  <rect class="box-teal" x="40" y="418" width="240" height="56" rx="8" stroke-width="1"/>
  <text class="th th-teal" x="160" y="438" text-anchor="middle" dominant-baseline="central">Circle forwarding</text>
  <text class="ts ts-teal" x="160" y="456" text-anchor="middle" dominant-baseline="central">Attestation + mint on Arc</text>

  <line x1="160" y1="474" x2="160" y2="504" class="arr" marker-end="url(#arrow)"/>
  <text class="ts ts-def" x="280" y="492" text-anchor="start">POST /api/pay records the tx</text>

  <!-- Invoice settled -->
  <rect class="box-blue" x="60" y="506" width="200" height="56" rx="8" stroke-width="0.5"/>
  <text class="th th-blue" x="160" y="526" text-anchor="middle" dominant-baseline="central">Invoice settled</text>
  <text class="ts ts-blue" x="160" y="544" text-anchor="middle" dominant-baseline="central">Ebook downloadable</text>

  <!-- Legend -->
  <rect class="legend-teal" x="420" y="500" width="12" height="12" rx="2" stroke-width="0.5"/>
  <text class="ts ts-def" x="438" y="511">Direct USDC flow (CCTP)</text>
  <rect class="legend-coral" x="420" y="520" width="12" height="12" rx="2" stroke-width="0.5"/>
  <text class="ts ts-def" x="438" y="531">Swap flow (Uniswap)</text>
  <rect class="legend-blue" x="420" y="540" width="12" height="12" rx="2" stroke-width="0.5"/>
  <text class="ts ts-def" x="438" y="551">Settlement (Arc)</text>
</svg>
